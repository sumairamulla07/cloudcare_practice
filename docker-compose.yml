version: "3.9"

services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Overrides .env's MONGODB_URI so the backend talks to the mongo
      # service above by default when running via docker-compose.
      # PLACEHOLDER: remove this override once you point MONGODB_URI at a
      # real Atlas cluster in backend/.env and want to use that instead.
      - MONGODB_URI=mongodb://mongo:27017
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  mongo_data:
